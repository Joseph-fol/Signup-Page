<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Signup</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&family=Outfit:wght@100..900&display=swap"
    rel="stylesheet">
</head>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "Montserrat", sans-serif;
  }

  body {
    background-color: #f5f7f9;
    display: flex;
    justify-content: center;
    align-items: center;
    margin: 45px;
  }

  .page {
    border: 1px solid #dfe1e2;
    border-radius: 5px;
    padding: 20px 40px;
  }

  @media screen and (max-width:460px) {
    .page {
      padding: 20px 20px;
    }

    body{
      margin: 20px;
    }
  }

  .form-control {
    border: none;
  }

  .form-control:focus {
    border: #ced4da;
    box-shadow: none;
  }
</style>

<body>
  <div class="page col-lg-6 col-md-10 col-sm-10 col-xs-12 bg-white py-4">
    <h2 class="text-left pt-3 fw-bold">Welcome back </h2>
    <p class="">Please enter your details</p>

    <div class="mt-5">

      <div class="d-flex justify-content-center align-items-center border px-3 rounded">
        <svg xmlns="http://www.w3.org/2000/svg" width="1.2em" height="1.2em" viewBox="0 0 24 24">
          <path fill="currentColor"
            d="M22 6c0-1.1-.9-2-2-2H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2zm-2 0l-8 5l-8-5zm0 12H4V8l8 5l8-5z" />
        </svg>
        <input type="email" class="form-control py-2" name="" id="email" placeholder="Email address">
      </div>

      <div class="d-flex justify-content-center align-items-center border px-3 my-4 rounded">
        <svg xmlns="http://www.w3.org/2000/svg" width="1.2em" height="1.2em" viewBox="0 0 16 16">
          <path fill="currentColor"
            d="M13.35 16H2.65C1.74 16 1 15.26 1 14.35v-7.7C1 5.74 1.74 5 2.65 5h10.7c.91 0 1.65.74 1.65 1.65v7.69c0 .91-.74 1.65-1.65 1.65ZM2.65 6c-.36 0-.65.29-.65.65v7.69c0 .36.29.65.65.65h10.7c.36 0 .65-.29.65-.65V6.65c0-.36-.29-.65-.65-.65z" />
          <path fill="currentColor"
            d="M12.54 6H3.46V4.54C3.46 2.04 5.5 0 8 0s4.54 2.04 4.54 4.54zM4.46 5h7.08v-.46C11.54 2.59 9.95 1 8 1S4.46 2.59 4.46 4.54z" />
          <circle cx="12" cy="10.5" r="1" fill="currentColor" />
          <circle cx="8" cy="10.5" r="1" fill="currentColor" />
          <circle cx="4" cy="10.5" r="1" fill="currentColor" />
        </svg>
        <input type="password" class="form-control py-2" name="" id="password" placeholder=" Password">
      </div>

      <div class="d-flex justify-content-center align-items-center border px-3 my-4 rounded">
        <svg xmlns="http://www.w3.org/2000/svg" width="1.2em" height="1.2em" viewBox="0 0 24 24">
          <path fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M13 18.675c1.93.83 4.242 1.325 7 1.325v-4l-4-1zm0 0C9.159 17.023 6.824 14.045 5.5 11m0 0C4.4 8.472 4 5.898 4 4h4l1 4z" />
        </svg>
        <input type="tel" class="form-control py-2" name="" id="" placeholder="Phone Number">
      </div>

      <button class="btn w-100 text-white mb-4 focus-bg-black" style="background-color: blue;" onclick="signUp()">Sign
        up</button>
    </div>


    <button onclick="signG()" class="btn block border border-dark w-100 mb-3 fw-semibold"><svg
        xmlns="http://www.w3.org/2000/svg" width="0.98em" height="1em" viewBox="0 0 256 262">
        <path fill="#4285f4"
          d="M255.878 133.451c0-10.734-.871-18.567-2.756-26.69H130.55v48.448h71.947c-1.45 12.04-9.283 30.172-26.69 42.356l-.244 1.622l38.755 30.023l2.685.268c24.659-22.774 38.875-56.282 38.875-96.027" />
        <path fill="#34a853"
          d="M130.55 261.1c35.248 0 64.839-11.605 86.453-31.622l-41.196-31.913c-11.024 7.688-25.82 13.055-45.257 13.055c-34.523 0-63.824-22.773-74.269-54.25l-1.531.13l-40.298 31.187l-.527 1.465C35.393 231.798 79.49 261.1 130.55 261.1" />
        <path fill="#fbbc05"
          d="M56.281 156.37c-2.756-8.123-4.351-16.827-4.351-25.82c0-8.994 1.595-17.697 4.206-25.82l-.073-1.73L15.26 71.312l-1.335.635C5.077 89.644 0 109.517 0 130.55s5.077 40.905 13.925 58.602z" />
        <path fill="#eb4335"
          d="M130.55 50.479c24.514 0 41.05 10.589 50.479 19.438l36.844-35.974C195.245 12.91 165.798 0 130.55 0C79.49 0 35.393 29.301 13.925 71.947l42.211 32.783c10.59-31.477 39.891-54.251 74.414-54.251" />
      </svg> Sign in with Google</button><br>

    <button onclick="gitHubLogin()" class="btn block border-dark w-100 fw-semibold"><svg
        xmlns="http://www.w3.org/2000/svg" width="1.03em" height="1em" viewBox="0 0 256 250">
        <path fill="#161614"
          d="M128.001 0C57.317 0 0 57.307 0 128.001c0 56.554 36.676 104.535 87.535 121.46c6.397 1.185 8.746-2.777 8.746-6.158c0-3.052-.12-13.135-.174-23.83c-35.61 7.742-43.124-15.103-43.124-15.103c-5.823-14.795-14.213-18.73-14.213-18.73c-11.613-7.944.876-7.78.876-7.78c12.853.902 19.621 13.19 19.621 13.19c11.417 19.568 29.945 13.911 37.249 10.64c1.149-8.272 4.466-13.92 8.127-17.116c-28.431-3.236-58.318-14.212-58.318-63.258c0-13.975 5-25.394 13.188-34.358c-1.329-3.224-5.71-16.242 1.24-33.874c0 0 10.749-3.44 35.21 13.121c10.21-2.836 21.16-4.258 32.038-4.307c10.878.049 21.837 1.47 32.066 4.307c24.431-16.56 35.165-13.12 35.165-13.12c6.967 17.63 2.584 30.65 1.255 33.873c8.207 8.964 13.173 20.383 13.173 34.358c0 49.163-29.944 59.988-58.447 63.157c4.591 3.972 8.682 11.762 8.682 23.704c0 17.126-.148 30.91-.148 35.126c0 3.407 2.304 7.398 8.792 6.14C219.37 232.5 256 184.537 256 128.002C256 57.307 198.691 0 128.001 0m-80.06 182.34c-.282.636-1.283.827-2.194.39c-.929-.417-1.45-1.284-1.15-1.922c.276-.655 1.279-.838 2.205-.399c.93.418 1.46 1.293 1.139 1.931m6.296 5.618c-.61.566-1.804.303-2.614-.591c-.837-.892-.994-2.086-.375-2.66c.63-.566 1.787-.301 2.626.591c.838.903 1 2.088.363 2.66m4.32 7.188c-.785.545-2.067.034-2.86-1.104c-.784-1.138-.784-2.503.017-3.05c.795-.547 2.058-.055 2.861 1.075c.782 1.157.782 2.522-.019 3.08m7.304 8.325c-.701.774-2.196.566-3.29-.49c-1.119-1.032-1.43-2.496-.726-3.27c.71-.776 2.213-.558 3.315.49c1.11 1.03 1.45 2.505.701 3.27m9.442 2.81c-.31 1.003-1.75 1.459-3.199 1.033c-1.448-.439-2.395-1.613-2.103-2.626c.301-1.01 1.747-1.484 3.207-1.028c1.446.436 2.396 1.602 2.095 2.622m10.744 1.193c.036 1.055-1.193 1.93-2.715 1.95c-1.53.034-2.769-.82-2.786-1.86c0-1.065 1.202-1.932 2.733-1.958c1.522-.03 2.768.818 2.768 1.868m10.555-.405c.182 1.03-.875 2.088-2.387 2.37c-1.485.271-2.861-.365-3.05-1.386c-.184-1.056.893-2.114 2.376-2.387c1.514-.263 2.868.356 3.061 1.403" />
      </svg> Sign in with GitHub</button>
    <div class="mt-2">
      <p>Already have an account ? <a href="signin.html">Signin</a></p>
    </div>
  </div>


</body>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
  integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>

<script type="module">
  // Import the functions you need from the SDKs you need
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
  import { getAuth, GoogleAuthProvider, signInWithPopup, GithubAuthProvider, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";

  // TODO: Add SDKs for Firebase products that you want to use  
  // https://firebase.google.com/docs/web/setup#available-libraries

  // Your web app's Firebase configuration
  const firebaseConfig = {
    apiKey: "AIzaSyD4_arjRluJZBuGZo1HJdimbyinBxPFbIU",
    authDomain: "classtwo-bd588.firebaseapp.com",
    projectId: "classtwo-bd588",
    storageBucket: "classtwo-bd588.firebasestorage.app",
    messagingSenderId: "506578448355",
    appId: "1:506578448355:web:fd16e7e1c10ad11385fad6"
  };

  const email = document.getElementById("email")
  const password = document.getElementById("password")

  // Initialize Firebase
  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const provider = new GoogleAuthProvider();
  const gitHubProvider = new GithubAuthProvider();

  const signG = () => {
    // console.log("working");
    signInWithPopup(auth, provider)
      .then((result) => {
        const user = result.user
        // console.log(user);

        setTimeout(() => {
          window.location.href = 'dashboard.html'
        }, 1000);

      })

      .catch((error) => {
        console.error(error)
      })
  }

  const gitHubLogin = () => {
    // console.log("working");
    signInWithPopup(auth, gitHubProvider)
      .then((result) => {
        const user = result.user

        setTimeout(() => {
          window.location.href = 'dashboard.html'
        }, 1000);
      })

      .catch((error) => {
        console.log(error);
      })
  }



  const signUp = () => {
    // console.log("working");

    const userEmail = email.value
    const userPassword = password.value

    createUserWithEmailAndPassword(auth, userEmail, userPassword)
      .then((userCredential) => {
        const user = userCredential.user

        setTimeout(() => {
          window.location.href = 'signin.html'
        }, 1000);

      })

      .catch((error) => {
        console.log(error);
      })
  }

  window.signG = signG
  window.gitHubLogin = gitHubLogin
  window.signUp = signUp

  // .then    -   To get a result
  // .catch   -   To catch an error
</script>

</html>
